# Perfil de producao (ativado no Render via SPRING_PROFILES_ACTIVE=prod)

# O Render injeta a porta via variavel de ambiente PORT
# O Spring Boot le SERVER_PORT automaticamente
server.port=${PORT:8081}

# Limits de upload — suficiente para varios .ban simultaneos
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB

# Logs menos verbosos em producao
logging.level.br.brasfoot.transfer=INFO
logging.level.root=WARN
