server.port=8081

# Aumenta o limite de upload (vários .ban podem ser grandes)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB

# Logs detalhados no pacote do transfer
logging.level.br.brasfoot.transfer=DEBUG
logging.level.root=INFO

# Nome da aplicação
spring.application.name=brasfoot-transfer
